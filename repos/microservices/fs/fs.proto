syntax = "proto3";

package cadaide.fs;

option go_package = "./fs_pb";

service FsService {
  rpc ListDir(ListDirRequest) returns (ListDirResponse);
  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  rpc TreeDir(TreeDirRequest) returns (TreeDirResponse);
  rpc WriteFile(WriteFileRequest) returns (Empty);
}

message ListDirRequest {
  string path = 1;
}

message ListDirResponse {
  repeated FileEntry entries = 1;
}

message FileEntry {
  string name = 1;
  string path = 2;
  string type = 3;
}

message ReadFileRequest {
  string path = 1;
}

message ReadFileResponse {
  string content = 1;
}

message TreeDirRequest {
  string path = 1;
  int32 depth = 2;
}

message TreeDirResponse {
  repeated FileEntry entries = 1;
}

message WriteFileRequest {
  string path = 1;
  string content = 2;
}

message Empty {}